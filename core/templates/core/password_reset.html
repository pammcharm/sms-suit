{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset Password - SMS Suite</title>
  <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="min-h-screen bg-slate-950">
  <main class="flex min-h-screen items-center justify-center px-6 py-10">
    <section class="w-full max-w-md rounded-lg bg-white p-6 shadow-2xl shadow-blue-950/40">
      <span class="grid h-12 w-12 place-items-center rounded-lg bg-blue-600 text-white"><i class="fa-solid fa-key"></i></span>
      <h1 class="mt-5 text-2xl font-bold text-slate-950">Reset your password</h1>
      <p class="mt-2 text-sm text-slate-500">Enter your account email and we will send a 6-digit verification code.</p>
      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        {% for field in form %}
        <label class="block text-sm font-medium text-slate-700">{{ field.label }}{{ field }}{% if field.errors %}<span class="mt-1 block text-xs text-rose-600">{{ field.errors|striptags }}</span>{% endif %}</label>
        {% endfor %}
        <button class="btn-primary w-full py-3"><i class="fa-solid fa-paper-plane"></i>Send verification code</button>
      </form>
      <a class="mt-5 block text-center text-sm font-semibold text-blue-700" href="{% url 'auth' %}">Back to sign in</a>
    </section>
  </main>
</body>
</html>
