{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }} - SMS Suite</title>
  <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="min-h-screen bg-slate-100">
  <main class="flex min-h-screen items-center justify-center px-4">
    <section class="max-w-md rounded-lg border border-slate-200 bg-white p-6 text-center shadow-sm">
      <span class="mx-auto grid h-14 w-14 place-items-center rounded-lg bg-rose-50 text-rose-600"><i class="fa-solid fa-circle-exclamation"></i></span>
      <h1 class="mt-4 text-2xl font-bold text-slate-950">{{ title }}</h1>
      <p class="mt-2 text-sm text-slate-500">{{ message }}</p>
      <div class="mt-5 flex justify-center gap-3">
        <a class="btn-primary" href="{% url 'workspace' %}"><i class="fa-solid fa-briefcase"></i>Workspace</a>
        <a class="rounded-md border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700" href="{% url 'dashboard' %}">Dashboard</a>
      </div>
    </section>
  </main>
</body>
</html>
