{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Updated - SMS Suite</title>
  <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="min-h-screen bg-slate-950">
  <main class="flex min-h-screen items-center justify-center px-6 py-10">
    <section class="w-full max-w-md rounded-lg bg-white p-6 text-center shadow-2xl shadow-blue-950/40">
      <span class="mx-auto grid h-12 w-12 place-items-center rounded-lg bg-emerald-600 text-white"><i class="fa-solid fa-circle-check"></i></span>
      <h1 class="mt-5 text-2xl font-bold text-slate-950">Password updated</h1>
      <p class="mt-2 text-sm text-slate-500">You can now sign in with your new password.</p>
      <a class="btn-primary mt-6 w-full py-3" href="{% url 'auth' %}"><i class="fa-solid fa-arrow-right-to-bracket"></i>Sign in</a>
    </section>
  </main>
</body>
</html>
